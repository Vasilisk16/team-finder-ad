{% if page_obj.has_other_pages %}
<nav class="pagination">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}{% if active_skill %}&skill={{ active_skill }}{% endif %}" class="pagination-link">← Назад</a>
    {% endif %}
    <span class="pagination-info">Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}{% if active_skill %}&skill={{ active_skill }}{% endif %}" class="pagination-link">Вперёд →</a>
    {% endif %}
</nav>
{% endif %}
